# =============================================================================
# Tmux Configuration
# =============================================================================

# --- Prefix ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- General ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# --- Keybindings ---
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Split panes (keep cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window (keep cwd)
bind c new-window -c "#{pane_current_path}"

# # Pane navigation (vim-style)
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Active sessions only
bind s display-popup -E -w 80% -h 70% "~/.config/tmux/scripts/active-session-switcher.sh"

# Session switcher (telescope-like, all sources)
bind S display-popup -E -w 80% -h 70% "~/.config/tmux/scripts/session-switcher.sh"

# Window switcher - current session only
bind w display-popup -E -w 80% -h 70% "~/.config/tmux/scripts/current-window-switcher.sh"

# Window switcher - all sessions (telescope-like)
bind W display-popup -E -w 80% -h 70% "~/.config/tmux/scripts/window-switcher.sh"

# Project switcher (zoxide-powered)
bind p display-popup -E -w 80% -h 70% "~/.config/tmux/scripts/project-switcher.sh"

# --- Plugins (managed as git submodules in plugins/) ---
run '~/.config/tmux/plugins/tmux-which-key/which-key.sh'
